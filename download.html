<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Tech Hub Support...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #efeae2; /* WhatsApp chat background color */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 350px;
        }
        .logo {
            width: 80px;
            height: 80px;
            background-color: #25D366; /* WhatsApp Green */
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 40px;
            font-weight: bold;
        }
        h2 {
            color: #075E54;
            margin-bottom: 10px;
        }
        p {
            color: #667781;
            font-size: 15px;
            line-height: 1.4;
        }
        .btn {
            display: inline-block;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 3px 10px rgba(37, 211, 102, 0.3);
            transition: 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #25D366;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto 0;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Green icon with a custom letter or icon -->
    <div class="logo">★</div>
    
    <h2>Tech Hub Support</h2>
    <p>Please wait, your secure chat application is downloading automatically...</p>
    
    <div class="loader" id="loader"></div>
    
    <!-- Agar auto-download na ho toh button par click kar sakein -->
    <a href="YOUR_DIRECT_APK_LINK_HERE" class="btn" id="downloadBtn">Download Manually</a>
</div>

<script>
    // 1. Google Drive ya Mediafire ka direct link yahan dalein
    const apkLink = "YOUR_DIRECT_APK_LINK_HERE";

    // 2. Page khulte hi auto-download trigger karne ke liye:
    window.onload = function() {
        // Button ka link update karein
        document.getElementById('downloadBtn').href = apkLink;
        
        // 1.5 seconds ke baad auto download start ho jaye
        setTimeout(() => {
            window.location.href = apkLink;
            document.getElementById('loader').style.display = 'none';
        }, 1500);
    };
</script>

</body>
</html>
