<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #e5ddd5; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .chat-container { width: 100%; max-width: 450px; height: 100vh; display: flex; flex-direction: column; background: #efeae2; }
        
        /* Premium Header */
        .chat-header { background: #075e54; color: white; padding: 15px; display: flex; align-items: center; gap: 10px; }
        
        /* Chat Area */
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: #e5ddd5; }
        
        /* Message Bubbles */
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 14.5px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sent-by-me { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; color: #111b21; }
        .received-by-me { background: #fff; align-self: flex-start; border-top-left-radius: 0; color: #111b21; }
        
        /* Media & Ticks */
        .msg img, .msg video { max-width: 100%; border-radius: 6px; }
        .msg-meta { align-self: flex-end; font-size: 10px; color: #667781; display: flex; gap: 3px; align-items: center; }
        .tick { font-size: 12px; }
        .tick.read { color: #53bdeb; }
        
        /* Input Area */
        .chat-input-area { padding: 10px; background: #f0f2f5; display: flex; align-items: center; gap: 8px; position: sticky; bottom: 0; }
        .input-container { flex: 1; background: #fff; border-radius: 24px; display: flex; align-items: center; padding: 4px 12px; }
        .input-container input { flex: 1; border: none; outline: none; padding: 8px; }
        .icon-btn { border: none; background: none; font-size: 20px; cursor: pointer; }
        .send-btn { background: #075e54; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div><b>Customer Support</b><br><small>Online</small></div>
    </div>
    <div class="chat-messages" id="chatBox"></div>
    <div class="chat-input-area">
        <input type="file" id="mediaInput" accept="image/*,video/*,audio/*" style="display: none;">
        <button class="icon-btn" onclick="document.getElementById('mediaInput').click()">📎</button>
        <div class="input-container">
            <input type="text" id="msgInput" placeholder="Type a message...">
            <button class="icon-btn" id="voiceBtn">🎙️</button>
        </div>
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDe8rFsoeI7QnlPfuJb_FyWOLe1SdqEZHM",
        authDomain: "wattsapp-27aa4.firebaseapp.com",
        projectId: "wattsapp-27aa4",
        storageBucket: "wattsapp-27aa4.firebasestorage.app",
        messagingSenderId: "826330591993",
        appId: "1:826330591993:web:51865cddf32ba8b5312828"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let myChatDocId = localStorage.getItem('my_chat_session_id') || "user_" + Date.now();
    localStorage.setItem('my_chat_session_id', myChatDocId);

    // Ye function aapke media, text aur ticks ko handle karega
    onSnapshot(query(collection(db, "group_messages", myChatDocId, "messages"), orderBy("time_now", "asc")), (snapshot) => {
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const msg = document.createElement('div');
            msg.className = 'msg ' + (data.sender === 'user' ? 'sent-by-me' : 'received-by-me');
            
            // Content handling
            let contentHtml = data.message_text || "";
            if (data.type === 'image') contentHtml = `<img src="${data.file_url}">`;
            else if (data.type === 'audio') contentHtml = `<audio controls src="${data.file_url}"></audio>`;
            
            // Ticks logic
            const ticks = data.status === 'read' ? '<span class="tick read">✓✓</span>' : '✓';
            msg.innerHTML = `${contentHtml} <div class="msg-meta">${data.time_label || ''} ${ticks}</div>`;
            chatBox.appendChild(msg);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // Send logic (yahan apna purana sendMessageToFirebase wala logic add kar lein)
    // ...
</script>
</body>
</html>
