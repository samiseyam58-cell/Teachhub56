<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #e5ddd5; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .chat-container { width: 100%; max-width: 450px; height: 100vh; display: flex; flex-direction: column; background: #efeae2; }
        
        .chat-header { background: #075e54; color: white; padding: 10px 15px; display: flex; align-items: center; gap: 12px; }
        .dp { width: 45px; height: 45px; border-radius: 50%; background: white; }
        
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: #e5ddd5; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14px; position: relative; }
        .sent-by-me { background: #d9fdd3; align-self: flex-end; }
        .received-by-me { background: #fff; align-self: flex-start; }
        
        .chat-input-area { padding: 10px; background: #f0f2f5; display: flex; align-items: center; gap: 8px; }
        .input-container { flex: 1; background: #fff; border-radius: 24px; display: flex; align-items: center; padding: 8px 15px; }
        input { flex: 1; border: none; outline: none; }
        .icon-btn { border: none; background: none; font-size: 20px; cursor: pointer; }
        .send-btn { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <img class="dp" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="DP">
        <div><b>Customer Support</b><br><small>Online</small></div>
    </div>
    <div class="chat-messages" id="chatBox"></div>
    <div class="chat-input-area">
        <input type="file" id="mediaInput" accept="image/*,audio/*" style="display: none;">
        <button class="icon-btn" onclick="document.getElementById('mediaInput').click()">📎</button>
        <div class="input-container">
            <input type="text" id="msgInput" placeholder="Type a message...">
            <button class="icon-btn" id="voiceBtn">🎙️</button>
        </div>
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDe8rFsoeI7QnlPfuJb_FyWOLe1SdqEZHM",
        authDomain: "wattsapp-27aa4.firebaseapp.com",
        projectId: "wattsapp-27aa4",
        storageBucket: "wattsapp-27aa4.firebasestorage.app",
        messagingSenderId: "826330591993",
        appId: "1:826330591993:web:51865cddf32ba8b5312828"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let myChatDocId = localStorage.getItem('my_chat_session_id') || "user_" + Date.now();
    localStorage.setItem('my_chat_session_id', myChatDocId);

    // Load Messages
    onSnapshot(query(collection(db, "group_messages", myChatDocId, "messages"), orderBy("time_now", "asc")), (snapshot) => {
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = "";
        snapshot.forEach((doc) => {
            const d = doc.data();
            const msg = document.createElement('div');
            msg.className = 'msg ' + (d.sender === 'user' ? 'sent-by-me' : 'received-by-me');
            
            if(d.type === 'image') msg.innerHTML = `<img src="${d.file_url}" width="100%">`;
            else if(d.type === 'audio') msg.innerHTML = `<audio controls src="${d.file_url}"></audio>`;
            else msg.innerText = d.message_text;
            
            chatBox.appendChild(msg);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // Send Text
    document.getElementById('sendBtn').onclick = async () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        await addDoc(collection(db, "group_messages", myChatDocId, "messages"), { sender: 'user', message_text: text, time_now: Date.now(), type: 'text' });
        document.getElementById('msgInput').value = "";
    };

    // Send Media
    document.getElementById('mediaInput').onchange = async (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async (r) => {
            const type = file.type.startsWith('image') ? 'image' : 'audio';
            await addDoc(collection(db, "group_messages", myChatDocId, "messages"), { sender: 'user', file_url: r.target.result, time_now: Date.now(), type: type });
        };
        reader.readAsDataURL(file);
    };
</script>
</body>
</html>
