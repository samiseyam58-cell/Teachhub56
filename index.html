<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        .header { background: #075e54; color: white; padding: 12px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .dp { width: 45px; height: 45px; border-radius: 50%; background: white; }
        
        /* Chat Area - Scrollable */
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; background: white; font-size: 14px; position: relative; }
        .sent { background: #d9fdd3; align-self: flex-end; }
        .meta { font-size: 10px; color: #666; margin-top: 4px; text-align: right; }
        .tick { margin-left: 5px; font-weight: bold; }
        .blue { color: #34b7f1; }
        
        /* Input Area - Force Fixed at Bottom */
        .chat-input { 
            position: fixed !important; 
            bottom: 0 !important; 
            left: 0 !important; 
            width: 100% !important; 
            background: #f0f2f5 !important; 
            padding: 10px !important; 
            display: flex !important; 
            align-items: center !important; 
            gap: 10px !important; 
            z-index: 999999 !important; 
            border-top: 1px solid #ccc;
        }
        .input-box { flex: 1; background: white; border-radius: 24px; padding: 12px 15px; border: 1px solid #ccc; outline: none; }
        .send-btn { background: #075e54; color: white; border: none; padding: 12px 20px; border-radius: 24px; }
    </style>
</head>
<body>

<div class="header">
    <img class="dp" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div><b>Customer Support</b><br><small>Online</small></div>
</div>

<div class="chat-messages" id="chatBox"></div>

<div class="chat-input">
    <input type="file" id="fileInput" hidden>
    <span style="font-size: 24px;" onclick="document.getElementById('fileInput').click()">📎</span>
    <input type="text" id="msgInput" class="input-box" placeholder="Type a message...">
    <button class="send-btn" id="sendBtn">➤</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDe8rFsoeI7QnlPfuJb_FyWOLe1SdqEZHM",
        authDomain: "wattsapp-27aa4.firebaseapp.com",
        projectId: "wattsapp-27aa4",
        storageBucket: "wattsapp-27aa4.firebasestorage.app",
        messagingSenderId: "826330591993",
        appId: "1:826330591993:web:51865cddf32ba8b5312828"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let userId = localStorage.getItem('my_chat_session_id') || "user_" + Date.now();
    localStorage.setItem('my_chat_session_id', userId);

    onSnapshot(query(collection(db, "group_messages", userId, "messages"), orderBy("time_now", "asc")), (snapshot) => {
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = "";
        snapshot.forEach((doc) => {
            const d = doc.data();
            const time = new Date(d.time_now).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            let tick = d.status === 'read' ? '<span class="blue">✓✓</span>' : (d.status === 'delivered' ? '✓✓' : '✓');
            
            const div = document.createElement('div');
            div.className = 'msg ' + (d.sender === 'user' ? 'sent' : '');
            div.innerHTML = `${d.type === 'image' ? `<img src="${d.file_url}" width="100%">` : d.type === 'audio' ? `<audio controls src="${d.file_url}"></audio>` : d.message_text} <div class="meta">${time} <span class="tick">${tick}</span></div>`;
            chatBox.appendChild(div);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('msgInput');
        if(!input.value) return;
        await addDoc(collection(db, "group_messages", userId, "messages"), { sender: 'user', message_text: input.value, time_now: Date.now(), type: 'text', status: 'sent' });
        input.value = "";
    };
</script>
</body>
</html>
