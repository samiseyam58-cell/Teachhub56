<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #e5ddd5; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .chat-container { width: 100%; max-width: 450px; height: 100vh; display: flex; flex-direction: column; background: #efeae2; }
        
        .chat-header { background: #075e54; color: white; padding: 15px; display: flex; align-items: center; gap: 10px; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; }
        
        /* Input Area Fix */
        .chat-input-area { padding: 10px; background: #f0f2f5; display: flex; align-items: center; gap: 8px; position: sticky; bottom: 0; }
        .input-container { flex: 1; background: #fff; border-radius: 25px; padding: 8px 15px; display: flex; align-items: center; }
        .input-container input { flex: 1; border: none; outline: none; padding: 5px; }
        .send-btn { background: #075e54; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; }
        
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; }
        .sent-by-me { background: #d9fdd3; align-self: flex-end; }
        .received-by-me { background: #fff; align-self: flex-start; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div><b>Customer Support</b><br><small>Online</small></div>
    </div>
    <div class="chat-messages" id="chatBox"></div>
    <div class="chat-input-area">
        <div class="input-container">
            <input type="text" id="msgInput" placeholder="Type a message...">
        </div>
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDe8rFsoeI7QnlPfuJb_FyWOLe1SdqEZHM",
        authDomain: "wattsapp-27aa4.firebaseapp.com",
        projectId: "wattsapp-27aa4",
        storageBucket: "wattsapp-27aa4.firebasestorage.app",
        messagingSenderId: "826330591993",
        appId: "1:826330591993:web:51865cddf32ba8b5312828"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let myChatDocId = localStorage.getItem('my_chat_session_id') || "user_" + Date.now();
    localStorage.setItem('my_chat_session_id', myChatDocId);

    const chatBox = document.getElementById('chatBox');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');

    // Load Messages
    onSnapshot(query(collection(db, "group_messages", myChatDocId, "messages"), orderBy("time_now", "asc")), (snapshot) => {
        chatBox.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const msg = document.createElement('div');
            msg.className = 'msg ' + (data.sender === 'user' ? 'sent-by-me' : 'received-by-me');
            msg.innerText = data.message_text || data.content;
            chatBox.appendChild(msg);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // Send Message
    sendBtn.addEventListener('click', async () => {
        const text = msgInput.value.trim();
        if(text) {
            await addDoc(collection(db, "group_messages", myChatDocId, "messages"), {
                sender: 'user', message_text: text, time_now: Date.now()
            });
            msgInput.value = "";
        }
    });
</script>
</body>
</html>
