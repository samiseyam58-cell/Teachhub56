<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Customer Support</title>
    <link rel="manifest" href="manifest.json">
    
    <!-- PWA Icons and Meta Tags (Sahi jagah par) -->
    <link rel="apple-touch-icon" href="https://i.postimg.cc/rpqRNgF7/IMG-20260717-112618.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Customer Support">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #dadbd3; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 450px; height: 100vh; background: #efeae2; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.15); overflow: hidden; }
        .chat-header { background: #008069; color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; background: #ccc; object-fit: cover; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 8px; border-radius: 8px; font-size: 14px; position: relative; display: flex; flex-direction: column; }
        .sent-by-me { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .received-by-me { background: #ffffff; align-self: flex-start; border-top-left-radius: 0; }
        .chat-input-area { padding: 10px; background: #f0f2f5; display: flex; align-items: center; gap: 8px; }
        .input-container { flex: 1; background: #fff; border-radius: 24px; display: flex; align-items: center; padding: 5px 15px; }
        input { flex: 1; border: none; outline: none; padding: 10px; }
        .icon-btn { font-size: 20px; cursor: pointer; border: none; background: none; }
        .send-btn { background: #005c4b; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } }
        .recording { color: red; animation: blink 1s infinite; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <img class="profile-img" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="Support">
        <div>
            <div style="font-weight: 600;">Customer Support</div>
            <div style="font-size: 12px; color: #b2dfdb;">Online</div>
        </div>
    </div>
    <div class="chat-messages" id="chatBox"></div>
    <div class="chat-input-area">
        <div class="input-container">
            <button class="icon-btn" onclick="document.getElementById('mediaInput').click()">📎</button>
            <input type="file" id="mediaInput" accept="image/*,video/*,audio/*" style="display: none;">
            <input type="text" id="msgInput" placeholder="Type a message...">
            <button class="icon-btn" id="voiceBtn">🎙️</button>
        </div>
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDe8rFsoeI7QnlPfuJb_FyWOLe1SdqEZHM",
        authDomain: "wattsapp-27aa4.firebaseapp.com",
        databaseURL: "https://wattsapp-27aa4-default-rtdb.firebaseio.com",
        projectId: "wattsapp-27aa4",
        storageBucket: "wattsapp-27aa4.firebasestorage.app",
        messagingSenderId: "826330591993",
        appId: "1:826330591993:web:51865cddf32ba8b5312828"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const chatBox = document.getElementById('chatBox');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    let myChatDocId = localStorage.getItem('my_chat_session_id') || "user_" + Date.now();
    localStorage.setItem('my_chat_session_id', myChatDocId);

    // Load Messages
    onSnapshot(query(collection(db, "group_messages", myChatDocId, "messages"), orderBy("time_now", "asc")), (snapshot) => {
        chatBox.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${data.sender === 'user' ? 'sent-by-me' : 'received-by-me'}`;
            msgDiv.innerText = data.message_text || "File sent";
            chatBox.appendChild(msgDiv);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    sendBtn.addEventListener('click', async () => {
        const text = msgInput.value;
        if(text){
            await addDoc(collection(db, "group_messages", myChatDocId, "messages"), {
                sender: 'user', message_text: text, time_now: Date.now()
            });
            msgInput.value = "";
        }
    });

    // PWA Install Logic
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // 3 seconds baad prompt show hoga
        setTimeout(() => {
            if(deferredPrompt) deferredPrompt.prompt();
        }, 3000);
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
