<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        .chat-header { background: #075e54; color: white; padding: 12px; display: flex; align-items: center; gap: 12px; }
        .dp { width: 45px; height: 45px; border-radius: 50%; background: white; object-fit: cover; }
        
        /* Messages */
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14px; background: white; }
        .sent { background: #d9fdd3; align-self: flex-end; }
        .tick { font-size: 10px; color: #53bdeb; float: right; margin-left: 5px; }

        /* Input Area (Fixed) */
        .chat-input { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 8px; z-index: 1000; }
        .input-box { flex: 1; background: white; border-radius: 24px; padding: 10px 15px; border: 1px solid #ccc; outline: none; }
        .icon { font-size: 22px; cursor: pointer; }
        .send-btn { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="chat-header">
    <img class="dp" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div><b>Customer Support</b><br><small>Online</small></div>
</div>

<div class="chat-messages" id="chatBox"></div>

<div class="chat-input">
    <input type="file" id="fileInput" hidden>
    <span class="icon" onclick="document.getElementById('fileInput').click()">📎</span>
    <input type="text" id="msgInput" class="input-box" placeholder="Type a message...">
    <span class="icon" id="voiceBtn">🎙️</span>
    <button class="send-btn" id="sendBtn">➤</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDe8rFsoeI7QnlPfuJb_FyWOLe1SdqEZHM",
        authDomain: "wattsapp-27aa4.firebaseapp.com",
        projectId: "wattsapp-27aa4",
        storageBucket: "wattsapp-27aa4.firebasestorage.app",
        messagingSenderId: "826330591993",
        appId: "1:826330591993:web:51865cddf32ba8b5312828"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let myChatDocId = localStorage.getItem('my_chat_session_id') || "user_" + Date.now();
    localStorage.setItem('my_chat_session_id', myChatDocId);

    // Render Messages
    onSnapshot(query(collection(db, "group_messages", myChatDocId, "messages"), orderBy("time_now", "asc")), (snapshot) => {
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = "";
        snapshot.forEach((doc) => {
            const d = doc.data();
            const div = document.createElement('div');
            div.className = 'msg ' + (d.sender === 'user' ? 'sent' : '');
            div.innerHTML = (d.type === 'image' ? `<img src="${d.file_url}" width="100%">` : 
                             d.type === 'audio' ? `<audio controls src="${d.file_url}"></audio>` : d.message_text) + 
                             `<span class="tick">✓✓</span>`;
            chatBox.appendChild(div);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // Send Text
    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('msgInput');
        if(!input.value) return;
        await addDoc(collection(db, "group_messages", myChatDocId, "messages"), { 
            sender: 'user', message_text: input.value, time_now: Date.now(), type: 'text' 
        });
        input.value = "";
    };

    // Send Media
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async (r) => {
            await addDoc(collection(db, "group_messages", myChatDocId, "messages"), { 
                sender: 'user', file_url: r.target.result, time_now: Date.now(), type: file.type.startsWith('image') ? 'image' : 'audio' 
            });
        };
        reader.readAsDataURL(file);
    };
</script>
</body>
</html>
