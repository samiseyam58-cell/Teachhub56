<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Hub - Admin Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #f0f2f5; display: flex; height: 100vh; overflow: hidden; color: #1e293b; }
        
        /* 👥 LEFT SIDEBAR: USER LIST */
        .sidebar { width: 350px; background: #ffffff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-header { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; padding: 20px 16px; font-size: 18px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .user-list { flex: 1; overflow-y: auto; list-style: none; }
        .user-item { padding: 15px 16px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .user-item:hover { background: #f8fafc; }
        .user-item.active { background: #e0f2fe; border-left: 4px solid #3b82f6; }
        .user-info { display: flex; flex-direction: column; gap: 4px; }
        .user-id { font-weight: 600; font-size: 14px; color: #334155; }
        .user-time { font-size: 11px; color: #64748b; }
        .unread-badge { background: #ef4444; color: white; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 10px; }

        /* 💬 RIGHT SIDEBAR: CHAT WINDOW */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #f1f5f9; position: relative; }
        .no-chat-selected { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #64748b; background: #f8fafc; }
        
        /* Chat Header */
        .chat-header { background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
        .active-user-title { font-size: 16px; font-weight: 600; color: #0f172a; }
        
        /* Messages Stream */
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Chat Bubbles */
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.45; word-wrap: break-word; display: flex; flex-direction: column; gap: 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .msg.sent-by-admin { background: #3b82f6; align-self: flex-end; border-bottom-right-radius: 2px; color: #ffffff; }
        .msg.received-by-admin { background: #ffffff; align-self: flex-start; border-bottom-left-radius: 2px; color: #1e293b; }
        .msg img, .msg video { max-width: 100%; max-height: 250px; border-radius: 8px; display: block; margin-top: 5px; }
        .msg audio { max-width: 100%; display: block; margin-top: 5px; outline: none; }
        .msg-meta { align-self: flex-end; font-size: 10px; color: #94a3b8; }
        .msg.sent-by-admin .msg-meta { color: #bfdbfe; }

        /* Input Controls */
        .chat-input-area { padding: 16px; background: #ffffff; border-top: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; }
        .input-container { flex: 1; background: #f1f5f9; border-radius: 24px; display: flex; align-items: center; padding: 2px 16px; border: 1px solid #e2e8f0; }
        .input-container input[type="text"] { flex: 1; border: none; outline: none; padding: 12px 4px; font-size: 14px; background: transparent; color: #1e293b; }
        .icon-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #64748b; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
        .icon-btn:hover { color: #3b82f6; }
        .send-btn { background: #3b82f6; color: white; border: none; padding: 10px 24px; font-size: 14px; font-weight: bold; border-radius: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); transition: background 0.2s; }
        .send-btn:hover { background: #2563eb; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, limit } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Firebase Configuration (Same as user app)
        const firebaseConfig = {
            apiKey: "AIzaSyDe8rFsoeI7QnlPfuJb_FyWOLe1SdqEZHM",
            authDomain: "wattsapp-27aa4.firebaseapp.com",
            databaseURL: "https://wattsapp-27aa4-default-rtdb.firebaseio.com",
            projectId: "wattsapp-27aa4",
            storageBucket: "wattsapp-27aa4.firebasestorage.app",
            messagingSenderId: "826330591993",
            appId: "1:826330591993:web:51865cddf32ba8b5312828",
            measurementId: "G-WY2ND6EVZC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const userListEl = document.getElementById('userList');
        const chatAreaEl = document.getElementById('chatArea');
        const activeUserTitleEl = document.getElementById('activeUserTitle');
        const chatBoxEl = document.getElementById('chatBox');
        const msgInputEl = document.getElementById('msgInput');
        const sendBtnEl = document.getElementById('sendBtn');
        const mediaInputEl = document.getElementById('mediaInput');

        let selectedChatId = null;
        let messagesUnsubscribe = null;

        // 1. Fetch active users list ordered by latest updates
        function listenToUsers() {
            const q = query(collection(db, "group_messages"), orderBy("lastUpdated", "desc"), limit(50));
            onSnapshot(q, (snapshot) => {
                userListEl.innerHTML = "";
                snapshot.forEach((userDoc) => {
                    const userId = userDoc.id;
                    const userData = userDoc.data();
                    const lastTime = userData.lastUpdated ? new Date(userData.lastUpdated).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Active';
                    
                    const li = document.createElement('li');
                    li.classList.add('user-item');
                    if (userId === selectedChatId) li.classList.add('active');

                    li.innerHTML = `
                        <div class="user-info">
                            <span class="user-id">${userId}</span>
                            <span class="user-time">${lastTime}</span>
                        </div>
                    `;

                    // Unread indicators counting logic can be added here
                    li.addEventListener('click', () => selectUserChat(userId));
                    userListEl.appendChild(li);
                });
            });
        }

        // 2. Select a customer chat to display conversation stream
        function selectUserChat(userId) {
            selectedChatId = userId;
            
            // Highlight active user item in list
            document.querySelectorAll('.user-item').forEach(item => {
                item.classList.remove('active');
                if (item.querySelector('.user-id').innerText === userId) item.classList.add('active');
            });

            // Toggle dashboard screen panels
            document.getElementById('noChatSelected').style.display = 'none';
            document.getElementById('activeChatWindow').style.display = 'flex';
            activeUserTitleEl.innerText = `Chatting with: ${userId}`;

            // Clean previous active listener if exists
            if (messagesUnsubscribe) messagesUnsubscribe();

            const messagesQuery = query(collection(db, "group_messages", userId, "messages"), orderBy("time_now", "asc"));
            messagesUnsubscribe = onSnapshot(messagesQuery, (snapshot) => {
                chatBoxEl.innerHTML = "";
                snapshot.forEach((snapshotDoc) => {
                    const data = snapshotDoc.data();
                    
                    // Mark client's messages as 'read' automatically since admin is active on screen
                    if (data.sender === 'user' && data.status !== 'read') {
                        const docRef = doc(db, "group_messages", userId, "messages", snapshotDoc.id);
                        updateDoc(docRef, { status: 'read' });
                    }

                    renderAdminMessage(data.sender, data.type || 'text', data.file_url || data.content || data.message_text, data.time_label);
                });
                chatBoxEl.scrollTop = chatBoxEl.scrollHeight;
            });
        }

        // 3. Render HTML chat bubble into stream
        function renderAdminMessage(sender, type, content, timeStr) {
            const msgDiv = document.createElement('div');
            const isAdmin = sender === 'admin';
            msgDiv.classList.add('msg', isAdmin ? 'sent-by-admin' : 'received-by-admin');

            if (!content) return;

            if (type === 'text') {
                const textSpan = document.createElement('span');
                textSpan.innerText = content;
                msgDiv.appendChild(textSpan);
            } else if (type === 'image') {
                const img = document.createElement('img');
                img.src = content;
                img.onload = () => { chatBoxEl.scrollTop = chatBoxEl.scrollHeight; };
                msgDiv.appendChild(img);
            } else if (type === 'video') {
                const video = document.createElement('video');
                video.src = content;
                video.controls = true;
                msgDiv.appendChild(video);
            } else if (type === 'audio') {
                const audio = document.createElement('audio');
                audio.src = content;
                audio.controls = true;
                msgDiv.appendChild(audio);
            }

            const metaDiv = document.createElement('div');
            metaDiv.classList.add('msg-meta');
            metaDiv.innerText = timeStr || '';
            msgDiv.appendChild(metaDiv);

            chatBoxEl.appendChild(msgDiv);
        }

        function getFormattedTime() {
            const now = new Date();
            let hours = now.getHours(); let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12; hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0'+minutes : minutes;
            return hours + ':' + minutes + ' ' + ampm;
        }

        // 4. Send Message Function
        async function sendAdminMessage() {
            const text = msgInputEl.value.trim();
            if (!text || !selectedChatId) return;

            msgInputEl.value = "";
            const timestamp = Date.now();

            // Update parent doc status timestamp
            await updateDoc(doc(db, "group_messages", selectedChatId), { lastUpdated: timestamp });

            const messageData = {
                sender: "admin",
                type: "text",
                time_now: timestamp,
                time_label: getFormattedTime(),
                status: "sent",
                file_url: "",
                message_text: text
            };

            await addDoc(collection(db, "group_messages", selectedChatId, "messages"), messageData);
        }

        // 5. Media Sending Conversion Logic
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error);
        });

        mediaInputEl.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || !selectedChatId) return;
            
            let fileType = file.type.startsWith('image/') ? 'image' : file.type.startsWith('video/') ? 'video' : file.type.startsWith('audio/') ? 'audio' : 'text';
            const base64 = await toBase64(file);
            
            const timestamp = Date.now();
            await updateDoc(doc(db, "group_messages", selectedChatId), { lastUpdated: timestamp });

            await addDoc(collection(db, "group_messages", selectedChatId, "messages"), {
                sender: "admin",
                type: fileType,
                time_now: timestamp,
                time_label: getFormattedTime(),
                status: "sent",
                file_url: base64,
                message_text: `Sent an ${fileType}`
            });
        });

        sendBtnEl.addEventListener('click', sendAdminMessage);
        msgInputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendAdminMessage(); });

        listenToUsers();
    </script>
</head>
<body>

    <!-- 👥 Left Panel: Users List -->
    <div class="sidebar">
        <div class="sidebar-header">Tech Hub Admin</div>
        <ul class="user-list" id="userList">
            <!-- Active conversation streams will populate here dynamically -->
        </ul>
    </div>

    <!-- 💬 Right Panel: Active Area View -->
    <div class="chat-area" id="chatArea">
        
        <!-- Screen Fallback State -->
        <div class="no-chat-selected" id="noChatSelected">
            <p>Please select a user session from the sidebar panel to begin chatting.</p>
        </div>

        <!-- Main Chat Box Container Window -->
        <div id="activeChatWindow" style="display: none; flex-direction: column; height: 100%; width: 100%;">
            <div class="chat-header">
                <div class="active-user-title" id="activeUserTitle">Chat Window</div>
                <div style="font-size: 13px; color: #10b981; font-weight: 500;">🟢 Agent Connected</div>
            </div>
            
            <div class="chat-messages" id="chatBox"></div>
            
            <div class="chat-input-area">
                <div class="input-container">
                    <input type="file" id="mediaInput" accept="image/*,video/*,audio/*" style="display: none;">
                    <button class="icon-btn" onclick="document.getElementById('mediaInput').click()" style="margin-right: 8px;">📎</button>
                    <input type="text" id="msgInput" placeholder="Type your support response here...">
                </div>
                <button class="send-btn" id="sendBtn">Send Reply</button>
            </div>
        </div>

    </div>

</body>
</html>
